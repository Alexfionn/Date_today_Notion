name: Date Today → Notion
on:
  workflow_dispatch: {}
  schedule:
    - cron: "5 0 * * *"   # run every day at 00:05 UTC

jobs:
  run-quote:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATE_BLOCK_ID: ${{ secrets.NOTION_DATE_BLOCK_ID }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}   # ← THIS IS MISSING
      TZ: "Europe/Zurich"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pillow

      - name: Update Notion block with today's date
        run: python date_today.py
